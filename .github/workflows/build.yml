name: Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
  
  workflow_dispatch:
    inputs:
      ref:
        description: 'The git ref to build (branch, tag, or commit SHA).'
        required: false
        default: 'main'

jobs:
  on-linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.event.inputs.ref || github.ref }}

    - name: make
      run: make

    - name: test-run
      run: dist/cpc --version
    
    - name: make test
      run: make test
    
    - name: testrun
      run: build/Test/testrun.sh

  on-windows-with-msvc:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5
    - name: set up MSVC 2022
      uses: ilammy/msvc-dev-cmd@v1
      with:
        vsversion: 2022

    - name: make
      run: make

    - name: test-run
      run: dist/cpc --version
    
    - name: make test
      run: make test
    
    - name: testrun
      run: cmd /c build\Test\testrun.bat

  on-windows-with-mingw:

    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v5

    - name: set up mingw
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        update: true
        install: |
          base-devel
      
    - name: make
      run: make CC=gcc

    - name: test-run
      run: dist/cpc --version
    
    - name: make test
      run: make test CC=gcc
    
    - name: testrun
      run: cmd /c build\Test\testrun.bat
