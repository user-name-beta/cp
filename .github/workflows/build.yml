name: Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'Makefile.am'
      - 'configure.ac'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'Makefile.am'
      - 'configure.ac'
      - '.github/workflows/build.yml'

jobs:
  on-linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Update software sources
      run: sudo apt-get update
    
    - name: Install GNU Autotools
      run: sudo apt-get install -y autoconf automake libtool
    
    - name: Generate configure script
      run: autoreconf -i
    
    - name: Run configure script
      run: ./configure
    
    - name: Make
      run: make
    
    - name: Run tests
      run: make check

  on-windows-with-msvc:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5
    - name: set up MSVC 2022
      uses: ilammy/msvc-dev-cmd@v1
      with:
        vsversion: 2022

    - name: Set up MSYS2 environment
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        update: true
        install: >-
          make
          autoconf
          automake
          libtool
    
    - name: Generate configure script
      shell: msys2 {0}
      env:
        CHERE_INVOKING: 1         # Do not run in $HOME
        MSYS2_PATH_TYPE: inherit  # Inherit environment variables
      run: autoreconf -i
    
    - name: Run configure script
      shell: msys2 {0}
      env:
        CHERE_INVOKING: 1
        MSYS2_PATH_TYPE: inherit
      run: ./configure
    
    - name: Make
      shell: msys2 {0}
      env:
        CHERE_INVOKING: 1
        MSYS2_PATH_TYPE: inherit
      run: make
    
    - name: Run tests
      shell: msys2 {0}
      env:
        CHERE_INVOKING: 1
        MSYS2_PATH_TYPE: inherit
      run: make check

  on-windows-with-mingw:

    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v5

    - name: set up mingw
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        update: true
        install: |
          base-devel
          autoconf
          automake
          libtool
      
    - name: Generate configure script
      shell: msys2 {0}
      env:
        CHERE_INVOKING: 1         # Do not run in $HOME
        MSYS2_PATH_TYPE: inherit  # Inherit environment variables
      run: autoreconf -i
    
    - name: Run configure script
      shell: msys2 {0}
      env:
        CHERE_INVOKING: 1
        MSYS2_PATH_TYPE: inherit
      run: ./configure
    
    - name: Make
      shell: msys2 {0}
      env:
        CHERE_INVOKING: 1
        MSYS2_PATH_TYPE: inherit
      run: make
    
    - name: Run tests
      shell: msys2 {0}
      env:
        CHERE_INVOKING: 1
        MSYS2_PATH_TYPE: inherit
      run: make check
